<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kipu EMR Challenge — Community Medical Services</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --blue:#2D68B2; --green:#80C342; --yellow:#FFE850; --orange:#F57E20; --gray:#7E868C; }
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',Arial,sans-serif;background:linear-gradient(160deg,#1a4a8a 0%,var(--blue) 40%,#1e5694 100%);min-height:100vh;color:#fff;}
input::placeholder{color:rgba(255,255,255,0.8);}
textarea::placeholder{color:rgba(255,255,255,0.5);}
.shell{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative;}
.card{background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);border-radius:24px;padding:32px;border:1px solid rgba(255,255,255,0.12);box-shadow:0 20px 60px rgba(0,0,0,0.3);animation:slideUp 0.5s ease-out;max-width:600px;width:100%;}
.btn{padding:14px 28px;border-radius:14px;border:none;cursor:pointer;font-family:'Poppins',sans-serif;font-weight:700;font-size:16px;transition:all 0.2s;}
.btn-green{background:linear-gradient(135deg,var(--green),#6aaf35);color:#fff;box-shadow:0 6px 25px rgba(128,195,66,0.4);}
.btn-green:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(128,195,66,0.5);}
.btn-blue{background:linear-gradient(135deg,var(--blue),#1e5694);color:#fff;box-shadow:0 6px 25px rgba(45,104,178,0.4);}
.btn-orange{background:linear-gradient(135deg,var(--orange),#d06a18);color:#fff;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.logo{display:block;margin:0 auto 16px;}
.tagline{text-align:center;color:rgba(255,255,255,0.4);font-size:12px;margin-top:20px;}
h1{font-weight:800;font-size:28px;line-height:1.15;margin-bottom:8px;text-align:center;}
h2{font-weight:700;font-size:22px;margin-bottom:12px;}
h3{font-weight:700;font-size:16px;margin-bottom:8px;}
.timer-bar{width:100%;height:10px;background:rgba(255,255,255,0.15);border-radius:99px;overflow:hidden;margin:8px 0;}
.timer-fill{height:100%;border-radius:99px;transition:width 0.3s linear,background 0.5s;}
.timer-circle{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:50%;font-weight:800;font-size:28px;}
.option-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.option-btn{display:flex;align-items:center;gap:12px;padding:18px 16px;border-radius:16px;border:3px solid transparent;color:#fff;cursor:pointer;font-size:15px;font-family:Arial,sans-serif;font-weight:600;text-align:left;min-height:70px;position:relative;transition:all 0.3s;}
.option-btn:disabled{cursor:default;}
.option-shape{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.lb-row{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.08);gap:14px;}
.lb-rank{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;flex-shrink:0;}
.poll-opt{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);cursor:pointer;transition:all 0.2s;margin-bottom:8px;}
.poll-opt.sel{border-color:var(--green);background:rgba(128,195,66,0.15);}
.poll-dot{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.poll-opt.sel .poll-dot{border-color:var(--green);background:var(--green);}
.poll-opt.sel .poll-dot::after{content:'✓';font-size:12px;color:#fff;}
textarea{width:100%;padding:14px;border-radius:12px;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:#fff;font-family:Arial,sans-serif;font-size:14px;resize:vertical;min-height:80px;outline:none;}
textarea:focus{border-color:var(--green);}
.host-q-display{background:rgba(255,255,255,0.95);border-radius:20px;padding:28px 24px;margin-bottom:20px;color:#1a1a2e;text-align:center;}
.host-opt{border-radius:16px;padding:18px 16px;display:flex;align-items:center;gap:12px;transition:all 0.3s;}
@keyframes slideUp{0%{opacity:0;transform:translateY(30px);}100%{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
@keyframes popIn{0%{opacity:0;transform:translate(-50%,-50%) scale(0.3);}60%{opacity:1;transform:translate(-50%,-50%) scale(1.1);}100%{opacity:1;transform:translate(-50%,-50%) scale(1);}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
</style>
</head>

// ===== HOST =====
function HostApp(){
  var [phase,setPhase]=useState("lobby");
  var [currentQ,setCurrentQ]=useState(-1);
  var [players,setPlayers]=useState({});
  var [timerEnd,setTimerEnd]=useState(0);
  var [timeLeft,setTimeLeft]=useState(0);
  var [sessionId]=useState(function(){return genId();});
  var [pollData,setPollData]=useState({});
  var interval=useRef(null);

  // Init game + poll for data
  useEffect(function(){
    fb.set("state",{phase:"lobby",currentQ:-1,timerEnd:0,sessionId:sessionId});
    fb.set("players",{});
    fb.set("poll",{});
    interval.current=setInterval(function(){
      fb.get("players").then(function(p){if(p)setPlayers(p);});
      fb.get("poll").then(function(p){if(p)setPollData(p);});
    },1500);
    return function(){clearInterval(interval.current);};
  },[]);

  // Timer
  useEffect(function(){
    if(phase!=="playing")return;
    var iv=setInterval(function(){
      var rem=Math.max(0,Math.ceil((timerEnd-Date.now())/1000));
      setTimeLeft(rem);
      if(rem<=0){
        clearInterval(iv);
        setPhase("reveal");
        fb.update("state",{phase:"reveal",timerEnd:0});
      }
    },250);
    return function(){clearInterval(iv);};
  },[phase,timerEnd]);

  var playerList=Object.entries(players).map(function(e){return{id:e[0],name:e[1].name,score:e[1].score||0,answers:e[1].answers||{}};});
  playerList.sort(function(a,b){return b.score-a.score;});
  var playerCount=playerList.length;
  var question=QUESTIONS[currentQ]||null;

  function advanceQ(idx){
    if(idx>=QUESTIONS.length){
      setPhase("poll-wait");
      fb.update("state",{phase:"poll",currentQ:-1,timerEnd:0});
      return;
    }
    var q=QUESTIONS[idx];
    var end=Date.now()+q.time*1000;
    setCurrentQ(idx);setTimerEnd(end);setTimeLeft(q.time);setPhase("playing");
    fb.update("state",{phase:"playing",currentQ:idx,timerEnd:end});
  }

  // --- LOBBY ---
  if(phase==="lobby"){
    return h("div",{className:"shell"},
      h("div",{style:{textAlign:"center",maxWidth:600,width:"100%"}},
        h("img",{src:LOGO_SRC,className:"logo",style:{width:200}}),
        h("div",{className:"card"},
          h("h1",null,"Kipu EMR Challenge"),
          h("p",{style:{color:"rgba(255,255,255,0.6)",fontSize:15,marginBottom:24,textAlign:"center"}},"Players — open this page on your phone and tap \"I'm a Player\""),
          h("div",{style:{background:"rgba(255,255,255,0.05)",borderRadius:16,padding:24,marginBottom:24,textAlign:"center"}},
            h("div",{style:{fontSize:48,marginBottom:8}},"👥"),
            h("div",{style:{fontSize:64,fontWeight:800,color:"var(--green)"}},playerCount),
            h("div",{style:{color:"rgba(255,255,255,0.6)",fontSize:15}},playerCount===1?"player joined":"players joined")
          ),
          playerList.length>0?h("div",{style:{marginBottom:24,display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center"}},
            playerList.map(function(p){return h("span",{key:p.id,style:{background:"rgba(255,255,255,0.1)",borderRadius:20,padding:"6px 16px",fontSize:14}},p.name);})
          ):null,
          h("button",{className:"btn btn-green",style:{width:"100%",fontSize:18},disabled:playerCount<1,onClick:function(){advanceQ(0);}},
            playerCount<1?"Waiting for players...":"Start Game ("+playerCount+" players)")
        )
      )
    );
  }

  // --- PLAYING ---
  if(phase==="playing"&&question){
    var answered=0;
    playerList.forEach(function(p){if(p.answers&&p.answers["q"+currentQ])answered++;});
    var pct=question.time>0?(timeLeft/question.time)*100:0;
    var barCol=pct>50?"var(--green)":pct>25?"var(--yellow)":"var(--orange)";
    return h("div",{className:"shell"},
      h("div",{style:{maxWidth:800,width:"100%",textAlign:"center"}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
          h("span",{style:{fontSize:15,color:"rgba(255,255,255,0.6)"}},"Question "+(currentQ+1)+" of "+QUESTIONS.length),
          h("span",{style:{fontSize:15,color:"rgba(255,255,255,0.6)"}},answered+"/"+playerCount+" answered")
        ),
        h("div",{className:"timer-bar"},h("div",{className:"timer-fill",style:{width:pct+"%",background:barCol}})),
        h("div",{style:{margin:"20px 0"}},
          h("span",{className:"timer-circle",style:{
            background:timeLeft<=5?"rgba(245,126,32,0.3)":"rgba(255,255,255,0.08)",
            border:"3px solid "+(timeLeft<=5?"var(--orange)":"rgba(255,255,255,0.15)"),
            color:timeLeft<=5?"var(--orange)":"#fff",
            animation:timeLeft<=5?"pulse 0.5s infinite":"none"
          }},timeLeft)
        ),
        h("div",{className:"host-q-display"},
          h("h2",{style:{fontSize:24,margin:0}},question.q),
          question.type==="multi"?h("p",{style:{color:"var(--blue)",fontSize:14,marginTop:8,fontWeight:600}},"Select all that apply"):null
        ),
        h("div",{className:"option-grid"},
          question.options.map(function(opt,i){
            return h("div",{key:i,className:"host-opt",style:{background:OPT_COLORS[i%4]+"cc"}},
              h("span",{className:"option-shape"},OPT_SHAPES[i]),
              h("span",{style:{fontSize:16,fontWeight:600}},opt)
            );
          })
        )
      )
    );
  }

  // --- REVEAL ---
  if(phase==="reveal"&&question){
    return h("div",{className:"shell"},
      h("div",{style:{maxWidth:800,width:"100%",textAlign:"center"}},
        h("div",{className:"host-q-display"},h("h2",{style:{fontSize:20,margin:0}},question.q)),
        h("div",{className:"option-grid"},
          question.options.map(function(opt,i){
            var isC=question.type==="multi"?question.correct.indexOf(i)>=0:(i===question.correct||i===question.correctAlt);
            var picks=0;
            playerList.forEach(function(p){
              var a=p.answers&&p.answers["q"+currentQ];
              if(a){
                if(question.type==="multi"){if(a.sel&&a.sel.indexOf(i)>=0)picks++;}
                else{if(a.sel===i)picks++;}
              }
            });
            return h("div",{key:i,className:"host-opt",style:{
              background:isC?"var(--green)":"rgba(255,255,255,0.08)",
              border:isC?"3px solid #fff":"3px solid transparent",
              opacity:isC?1:0.45,
              boxShadow:isC?"0 0 25px rgba(128,195,66,0.5)":"none"
            }},
              h("span",{className:"option-shape"},isC?"✓":OPT_SHAPES[i]),
              h("span",{style:{fontSize:16,fontWeight:600,flex:1}},opt),
              h("span",{style:{fontSize:14,opacity:0.8}},picks+" picked")
            );
          })
        ),
        h("button",{className:"btn btn-green",style:{marginTop:24,fontSize:16},onClick:function(){setPhase("leaderboard");}},"Show Leaderboard →")
      )
    );
  }

  // --- LEADERBOARD ---
  if(phase==="leaderboard"){
    var isLast=currentQ>=QUESTIONS.length-1;
    return h("div",{className:"shell"},
      h("div",{style:{maxWidth:600,width:"100%",textAlign:"center"}},
        h("h1",{style:{marginBottom:4}},isLast?"🏆 Final Standings":"Leaderboard"),
        h("p",{style:{color:"rgba(255,255,255,0.6)",fontSize:14,marginBottom:24}},isLast?"After all "+QUESTIONS.length+" questions":"After question "+(currentQ+1)+" of "+QUESTIONS.length),
        h("div",{className:"card",style:{padding:0,overflow:"hidden"}},
          playerList.map(function(p,idx){
            var cols=["var(--yellow)","#c0c0c0","#cd7f32"];
            var bg=idx<3?cols[idx]:"rgba(255,255,255,0.15)";
            return h("div",{key:p.id,className:"lb-row",style:{animation:"slideUp 0.4s ease-out "+(idx*0.1)+"s both"}},
              h("div",{className:"lb-rank",style:{background:bg,color:idx<3?"#1a1a2e":"#fff"}},idx+1),
              h("span",{style:{flex:1,fontSize:17,fontWeight:600,textAlign:"left"}},p.name),
              h("span",{style:{fontWeight:800,fontSize:20,color:"var(--green)"}},p.score.toLocaleString()),
              h("span",{style:{fontSize:12,color:"rgba(255,255,255,0.5)",marginLeft:4}},"pts")
            );
          })
        ),
        h("div",{style:{marginTop:24,display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}},
          isLast?h("button",{className:"btn btn-green",onClick:function(){advanceQ(QUESTIONS.length);}},"📋 Start Feedback Poll"):
            h("button",{className:"btn btn-green",onClick:function(){advanceQ(currentQ+1);}},"Next Question →"),
          isLast?h("button",{className:"btn btn-blue",onClick:function(){setPhase("analytics");}},"📊 View Analytics"):null
        )
      )
    );
  }

  // --- POLL WAIT / RESULTS ---
  if(phase==="poll-wait"||phase==="poll-results"){
    var pollEntries=Object.values(pollData);
    var pollCount=pollEntries.length;
    var showR=phase==="poll-results";
    var agg=POLL_QUESTIONS.map(function(pq,idx){
      var resps=[];
      pollEntries.forEach(function(pd){if(pd.answers&&pd.answers[idx]!=null&&pd.answers[idx]!=="")resps.push(pd.answers[idx]);});
      return{question:pq,responses:resps};
    });
    return h("div",{className:"shell",style:{justifyContent:"flex-start",paddingTop:24}},
      h("div",{style:{maxWidth:700,width:"100%"}},
        h("div",{style:{textAlign:"center",marginBottom:24}},
          h("h1",null,showR?"📋 Feedback Results":"📋 Feedback Poll"),
          h("p",{style:{color:"rgba(255,255,255,0.6)",fontSize:14}},pollCount+"/"+playerCount+" responses")
        ),
        showR?agg.map(function(item,idx){
          var pq=item.question;
          return h("div",{key:idx,className:"card",style:{marginBottom:16}},
            h("h3",null,(idx+1)+". "+pq.q),
            pq.type==="text"?
              h("div",{style:{marginTop:8}},item.responses.length===0?h("p",{style:{color:"rgba(255,255,255,0.4)",fontStyle:"italic"}},"No responses"):
                item.responses.map(function(r,ri){return h("div",{key:ri,style:{background:"rgba(255,255,255,0.05)",borderRadius:10,padding:"10px 14px",marginBottom:6,fontSize:14}},'"'+r+'"');})):
              h("div",{style:{marginTop:12}},pq.options.map(function(opt,oi){
                var cnt=item.responses.filter(function(r){return r===oi;}).length;
                var tot=Math.max(item.responses.length,1);
                var pw=Math.round((cnt/tot)*100);
                return h("div",{key:oi,style:{marginBottom:10}},
                  h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}},
                    h("span",null,opt),h("span",{style:{fontWeight:700}},cnt+" ("+pw+"%)")),
                  h("div",{style:{height:28,background:"rgba(255,255,255,0.08)",borderRadius:8,overflow:"hidden"}},
                    h("div",{style:{height:"100%",width:pw+"%",background:pq.type==="scale"?SCALE_COLORS[oi]:"var(--blue)",borderRadius:8,transition:"width 0.8s"}}))
                );
              }))
          );
        }):
        h("div",{className:"card",style:{textAlign:"center"}},
          h("div",{style:{fontSize:48,marginBottom:12}},"📝"),
          h("p",{style:{fontSize:16}},"Players are submitting feedback..."),
          h("div",{style:{fontSize:56,fontWeight:800,color:"var(--green)",margin:"16px 0"}},pollCount+"/"+playerCount)
        ),
        h("div",{style:{display:"flex",gap:12,justifyContent:"center",marginTop:16,flexWrap:"wrap"}},
          !showR?h("button",{className:"btn btn-green",onClick:function(){setPhase("poll-results");}},"View Results"):null,
          h("button",{className:"btn btn-blue",onClick:function(){setPhase("analytics");}},"📊 Quiz Analytics")
        )
      )
    );
  }

  // --- ANALYTICS ---
  if(phase==="analytics"){
    return h("div",{className:"shell",style:{justifyContent:"flex-start",paddingTop:24}},
      h("div",{style:{maxWidth:700,width:"100%"}},
        h("div",{style:{textAlign:"center",marginBottom:24}},
          h("img",{src:LOGO_SRC,className:"logo",style:{width:140}}),
          h("h1",null,"📊 Question Analytics")),
        QUESTIONS.map(function(q,qi){
          var total=0,correct=0;
          playerList.forEach(function(p){var a=p.answers&&p.answers["q"+qi];if(a){total++;if(a.correct)correct++;}});
          var pc=total>0?Math.round((correct/total)*100):0;
          var col=pc>=80?"var(--green)":pc>=50?"var(--yellow)":"var(--orange)";
          return h("div",{key:qi,className:"card",style:{marginBottom:12,padding:"16px 20px"}},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:16}},
              h("div",{style:{flex:1}},
                h("div",{style:{fontSize:12,color:"rgba(255,255,255,0.5)",marginBottom:4}},"Q"+(qi+1)),
                h("div",{style:{fontSize:14,fontWeight:600,lineHeight:1.3}},q.q)),
              h("div",{style:{textAlign:"right",flexShrink:0}},
                h("div",{style:{fontSize:28,fontWeight:800,color:col}},pc+"%"),
                h("div",{style:{fontSize:11,color:"rgba(255,255,255,0.5)"}},correct+"/"+total+" correct"))
            ),
            h("div",{style:{height:8,background:"rgba(255,255,255,0.1)",borderRadius:8,marginTop:10,overflow:"hidden"}},
              h("div",{style:{height:"100%",width:pc+"%",background:col,borderRadius:8,transition:"width 0.8s"}}))
          );
        }),
        h("div",{style:{display:"flex",gap:12,justifyContent:"center",marginTop:16,flexWrap:"wrap"}},
          h("button",{className:"btn btn-green",onClick:function(){setPhase("poll-results");}},"📋 Feedback Results"),
          h("button",{className:"btn btn-blue",onClick:function(){setPhase("leaderboard");setCurrentQ(QUESTIONS.length-1);}},"🏆 Final Standings"),
          h("button",{className:"btn btn-orange",onClick:function(){
            setPhase("lobby");setCurrentQ(-1);setPlayers({});setPollData({});
            fb.set("state",{phase:"lobby",currentQ:-1,timerEnd:0,sessionId:genId()});
            fb.set("players",{});fb.set("poll",{});
          }},"🔄 New Game")
        ),
        h("p",{className:"tagline"},"Connecting Recovery | Healing Communities")
      )
    );
  }

  return h("div",{className:"shell"},h("p",null,"Loading..."));
}

// ===== PLAYER =====
function PlayerApp(){
  var [phase,setPhase]=useState("join");
  var [name,setName]=useState("");
  var [playerId]=useState(function(){return genId();});
  var [currentQ,setCurrentQ]=useState(-1);
  var [selected,setSelected]=useState(null);
  var [multiSel,setMultiSel]=useState([]);
  var [feedback,setFeedback]=useState(false);
  var [lastOk,setLastOk]=useState(false);
  var [lastPts,setLastPts]=useState(0);
  var [myScore,setMyScore]=useState(0);
  var [streak,setStreak]=useState(0);
  var [pollAns,setPollAns]=useState(POLL_QUESTIONS.map(function(){return null;}));
  var [pollDone,setPollDone]=useState(false);
  var [gamePhase,setGamePhase]=useState("lobby");
  var [timerEnd,setTimerEnd2]=useState(0);
  var [timeLeft,setTimeLeft]=useState(0);
  var iv=useRef(null);

  // Poll game state
  useEffect(function(){
    iv.current=setInterval(function(){
      fb.get("state").then(function(gs){
        if(!gs)return;
        setGamePhase(gs.phase);
        setTimerEnd2(gs.timerEnd||0);
        if(gs.phase==="playing"&&gs.currentQ!==currentQ&&gs.currentQ>=0){
          setCurrentQ(gs.currentQ);
          setSelected(null);setMultiSel([]);setFeedback(false);
          if(phase==="waiting"||phase==="answered")setPhase("playing");
        }
        if(gs.phase==="poll"&&phase!=="poll"&&phase!=="done"&&phase!=="join"){
          setPhase("poll");
        }
      });
    },1000);
    return function(){clearInterval(iv.current);};
  });

  // Timer display
  useEffect(function(){
    if(phase!=="playing")return;
    var t=setInterval(function(){
      setTimeLeft(Math.max(0,Math.ceil((timerEnd-Date.now())/1000)));
    },250);
    return function(){clearInterval(t);};
  },[phase,timerEnd]);

  function join(){
    if(!name.trim())return;
    var obj={};obj[playerId]={name:name.trim(),score:0,answers:{}};
    fb.update("players",obj);
    setPhase("waiting");
  }

  function submitAns(sel){
    if(feedback)return;
    var q=QUESTIONS[currentQ];
    var elapsed=timerEnd?(Date.now()-(timerEnd-q.time*1000))/1000:q.time;
    var isC=false;
    if(q.type==="multi"){isC=q.correct.length===sel.length&&q.correct.every(function(c){return sel.indexOf(c)>=0;});}
    else{isC=sel===q.correct||(q.correctAlt!==undefined&&sel===q.correctAlt);}
    var tb=Math.max(0,Math.round((1-elapsed/q.time)*500));
    var sb=isC?Math.min(streak,3)*100:0;
    var pts=isC?500+tb+sb:0;
    setLastOk(isC);setLastPts(pts);setFeedback(true);
    var newScore=myScore+pts;
    if(isC){setMyScore(newScore);setStreak(function(s){return s+1;});}
    else{setStreak(0);}
    // Save
    var upd={};
    upd["players/"+playerId+"/score"]=newScore;
    upd["players/"+playerId+"/answers/q"+currentQ]={sel:sel,correct:isC,points:pts,time:Math.round(elapsed*10)/10};
    fb.update("",upd);
    setPhase("answered");
  }

  function clickOpt(i){
    if(feedback)return;
    var q=QUESTIONS[currentQ];
    if(q.type==="multi"){setMultiSel(function(p){return p.indexOf(i)>=0?p.filter(function(x){return x!==i;}):p.concat([i]);});}
    else{setSelected(i);submitAns(i);}
  }

  function submitPoll(){
    var obj={};obj[playerId]={name:name,answers:pollAns};
    fb.update("poll",obj);
    setPollDone(true);setPhase("done");
  }

  // --- JOIN ---
  if(phase==="join"){
    return h("div",{className:"shell"},
      h("div",{style:{maxWidth:400,width:"100%",textAlign:"center"}},
        h("img",{src:LOGO_SRC,className:"logo",style:{width:160}}),
        h("div",{className:"card"},
          h("h1",{style:{fontSize:24}},"Join the Game"),
          h("input",{type:"text",placeholder:"Enter your name",value:name,
            onChange:function(e){setName(e.target.value);},
            onKeyDown:function(e){if(e.key==="Enter")join();},
            style:{width:"100%",padding:"14px 18px",borderRadius:14,border:"2px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.08)",color:"#fff",fontSize:16,outline:"none",textAlign:"center",marginBottom:16}
          }),
          h("button",{className:"btn btn-green",style:{width:"100%"},disabled:!name.trim(),onClick:join},"Join")
        )
      )
    );
  }

  // --- WAITING ---
  if(phase==="waiting"){
    return h("div",{className:"shell"},
      h("div",{style:{textAlign:"center"}},
        h("div",{style:{fontSize:48,marginBottom:16,animation:"float 2s ease-in-out infinite"}},"✋"),
        h("h2",null,"You're in, "+name+"!"),
        h("p",{style:{color:"rgba(255,255,255,0.6)",marginTop:8}},"Waiting for the host to start the game...")
      )
    );
  }

  // --- PLAYING / ANSWERED ---
  if((phase==="playing"||phase==="answered")&&QUESTIONS[currentQ]){
    var q=QUESTIONS[currentQ];
    return h("div",{className:"shell",style:{justifyContent:"flex-start",paddingTop:16}},
      feedback?h("div",{style:{position:"fixed",top:"35%",left:"50%",transform:"translate(-50%,-50%)",zIndex:20,animation:"popIn 0.4s cubic-bezier(.17,.67,.28,1.2) forwards",textAlign:"center",pointerEvents:"none"}},
        h("div",{style:{fontSize:64,fontWeight:800,color:lastOk?"var(--green)":"var(--orange)",textShadow:"0 4px 30px rgba(0,0,0,0.5)"}},lastOk?"✓":"✗"),
        h("div",{style:{fontSize:24,fontWeight:700,marginTop:8,textShadow:"0 2px 15px rgba(0,0,0,0.4)"}},lastOk?"+"+lastPts+" pts":"No points"),
        h("div",{style:{fontSize:14,color:"rgba(255,255,255,0.7)",marginTop:4}},lastOk?"Nice!":"Look for the ✓ — that's the correct answer")
      ):null,
      h("div",{style:{maxWidth:500,width:"100%"}},
        h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13,color:"rgba(255,255,255,0.6)"}},
          h("span",null,"Q"+(currentQ+1)+"/"+QUESTIONS.length),
          h("span",null,myScore.toLocaleString()+" pts"),
          streak>=2?h("span",{style:{color:"var(--yellow)"}},"🔥"+streak):null
        ),
        !feedback?h("div",null,
          h("div",{className:"timer-bar"},h("div",{className:"timer-fill",style:{width:(q.time>0?(timeLeft/q.time)*100:0)+"%",background:timeLeft<=5?"var(--orange)":timeLeft<=10?"var(--yellow)":"var(--green)"}})),
          h("div",{style:{textAlign:"center",margin:"8px 0"}},
            h("span",{className:"timer-circle",style:{width:44,height:44,fontSize:20,
              background:timeLeft<=5?"rgba(245,126,32,0.3)":"rgba(255,255,255,0.08)",
              border:"3px solid "+(timeLeft<=5?"var(--orange)":"rgba(255,255,255,0.15)"),
              color:timeLeft<=5?"var(--orange)":"#fff"}},timeLeft))
        ):null,
        h("div",{style:{background:"rgba(255,255,255,0.92)",borderRadius:16,padding:"20px 16px",marginBottom:12,color:"#1a1a2e",textAlign:"center"}},
          h("h3",{style:{fontSize:16,margin:0}},q.q),
          q.type==="multi"?h("p",{style:{color:"var(--blue)",fontSize:12,marginTop:6}},"Select all that apply"):null
        ),
        h("div",{className:"option-grid"},
          q.options.map(function(opt,i){
            var isSel=q.type==="multi"?multiSel.indexOf(i)>=0:selected===i;
            var bg=OPT_COLORS[i%4];
            var isCorr=q.type==="multi"?q.correct.indexOf(i)>=0:(i===q.correct||i===q.correctAlt);
            var st={background:bg+"cc",borderColor:"transparent"};
            if(feedback){
              if(isCorr)st={background:"var(--green)",borderColor:"#fff",boxShadow:"0 0 15px rgba(128,195,66,0.5)"};
              else if(isSel)st={background:"var(--orange)",borderColor:"rgba(255,255,255,0.5)",opacity:0.85};
              else st={background:bg+"33",borderColor:"transparent",opacity:0.35};
            }else if(isSel){st={background:bg,borderColor:"rgba(255,255,255,0.6)"};}
            return h("button",{key:i,className:"option-btn",disabled:feedback,onClick:function(){clickOpt(i);},style:st},
              h("span",{className:"option-shape"},feedback?(isCorr?"✓":(isSel?"✗":OPT_SHAPES[i])):OPT_SHAPES[i]),
              h("span",{style:{flex:1}},opt)
            );
          })
        ),
        q.type==="multi"&&!feedback?
          h("button",{className:"btn btn-green",style:{width:"100%",marginTop:12},disabled:multiSel.length===0,onClick:function(){submitAns(multiSel);}},"Submit ("+multiSel.length+" selected)"):null
      )
    );
  }

  // --- POLL ---
  if(phase==="poll"&&!pollDone){
    return h("div",{className:"shell",style:{justifyContent:"flex-start",paddingTop:20}},
      h("div",{style:{maxWidth:500,width:"100%"}},
        h("h2",{style:{textAlign:"center",marginBottom:20}},"📋 Quick Feedback"),
        POLL_QUESTIONS.map(function(pq,idx){
          return h("div",{key:idx,className:"card",style:{marginBottom:12,padding:"16px 20px"}},
            h("h3",{style:{fontSize:14,marginBottom:10}},(idx+1)+". "+pq.q),
            pq.type==="text"?
              h("textarea",{placeholder:"Type your response...",value:pollAns[idx]||"",
                onChange:function(ev){var a=pollAns.slice();a[idx]=ev.target.value;setPollAns(a);}}):
              pq.options.map(function(opt,oi){
                var sel=pollAns[idx]===oi;
                return h("div",{key:oi,className:"poll-opt"+(sel?" sel":""),
                  onClick:function(){var a=pollAns.slice();a[idx]=oi;setPollAns(a);}},
                  h("div",{className:"poll-dot"}),
                  h("span",{style:{fontSize:14}},opt)
                );
              })
          );
        }),
        h("button",{className:"btn btn-green",style:{width:"100%",marginTop:12},onClick:submitPoll},"Submit Feedback")
      )
    );
  }

  // --- DONE ---
  if(phase==="done"||pollDone){
    return h("div",{className:"shell"},
      h("div",{style:{textAlign:"center"}},
        h("div",{style:{fontSize:56,marginBottom:16}},"🎉"),
        h("h2",null,"Thanks, "+name+"!"),
        h("p",{style:{color:"rgba(255,255,255,0.6)",marginTop:8,fontSize:18}},myScore.toLocaleString()+" points"),
        h("p",{style:{color:"rgba(255,255,255,0.4)",marginTop:12,fontSize:14}},"Feedback submitted. You're all done!"),
        h("p",{className:"tagline",style:{marginTop:32}},"Connecting Recovery | Healing Communities")
      )
    );
  }

  return h("div",{className:"shell"},h("p",null,"Connecting..."));
}

// ===== ROOT =====
function Root(){
  var [role,setRole]=useState(null);
  window._setRole=setRole;
  if(!role)return h(RoleSelect);
  if(role==="host")return h(HostApp);
  return h(PlayerApp);
}
ReactDOM.createRoot(document.getElementById("root")).render(h(Root));
</script>
